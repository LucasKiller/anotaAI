<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnotaAí</title>
  <style>
    :root {
      --bg: #f5efe3;
      --text: #1f1f1f;
      --card: #fffdf8;
      --brand: #1e6f5c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #f7d8b3 0%, var(--bg) 45%, #e6efe9 100%);
      display: grid;
      place-items: center;
    }

    main {
      width: min(680px, calc(100% - 2rem));
      background: var(--card);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 .5rem;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      line-height: 1.5;
    }

    strong {
      color: var(--brand);
    }
  </style>
</head>
<body>
  <main>
    <h1>AnotaAí</h1>
    <p>Base do MVP inicial pronta. Frontend Flutter será conectado nesta URL após o primeiro build web.</p>
    <p><strong>Próximo passo:</strong> rodar o cliente Flutter (`flutter run -d web-server`) e apontar para a API em <code>/v1</code>.</p>
  </main>
</body>
</html>
