services:
  client:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../../apps/client_flutter/web:/usr/share/nginx/html:ro
      - ../nginx/client.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build:
      context: ../../apps/api_python
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
      - path: ../../.env.example
        required: true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio_init:
        condition: service_completed_successfully

  worker:
    build:
      context: ../../apps/worker_python
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
      - path: ../../.env.example
        required: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio_init:
        condition: service_completed_successfully

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: anotaai
      POSTGRES_USER: anotaai
      POSTGRES_PASSWORD: anotaai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anotaai -d anotaai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio_init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    env_file:
      - path: ../../.env
        required: false
      - path: ../../.env.example
        required: true
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      until mc alias set local $$S3_ENDPOINT $$S3_ACCESS_KEY $$S3_SECRET_KEY; do sleep 2; done;
      mc mb --ignore-existing local/$$S3_BUCKET;
      mc anonymous set private local/$$S3_BUCKET;
      "

volumes:
  postgres_data:
  minio_data:
